    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    html{scroll-behavior:smooth;}
    body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;min-height:100vh;overflow-x:hidden;}
    input,select,textarea,button{font-family:'Syne',sans-serif;outline:none;}
    .world{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden;}
    .world::before{content:'';position:absolute;inset:0;background:linear-gradient(to bottom,#c8e0a8 0%,#a0c890 8%,#70a870 18%,#3a6848 35%,#243830 55%,#1a2e24 100%);}
    .world::after{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 120% 40% at 50% 20%,rgba(180,220,160,0.18) 0%,transparent 70%);}

    .ground-fade{position:absolute;bottom:0;left:0;right:0;height:75%;background:linear-gradient(to top,var(--bg) 0%,var(--bg) 30%,rgba(30,48,40,0.9) 55%,transparent 100%);}
    #root{position:relative;z-index:1;}
    ::-webkit-scrollbar{width:4px;}
    ::-webkit-scrollbar-track{background:var(--bg);}
    ::-webkit-scrollbar-thumb{background:#4a6858;border-radius:2px;}
    .bottom-nav{display:none;position:fixed;bottom:0;left:0;right:0;background:rgba(26,40,32,0.96);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-top:1px solid rgba(100,160,100,0.15);z-index:50;padding-bottom:env(safe-area-inset-bottom,0);}
    .bottom-nav-inner{display:flex;max-width:480px;margin:0 auto;}
    .nav-tab{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:10px 0 12px;cursor:pointer;background:none;border:none;color:var(--dim);font-family:'DM Mono',monospace;font-size:9px;letter-spacing:0.08em;text-transform:uppercase;transition:color 0.15s;}
    .nav-tab.active{color:var(--accent);}
    .nav-tab-icon{font-size:22px;line-height:1;}
    .top-tabs{display:flex;}
    @media(max-width:639px){.bottom-nav{display:block;}.top-tabs{display:none;}.main-content{padding-bottom:80px!important;}}
    @media(max-width:639px){.rgrid{grid-template-columns:1fr 1fr!important;}}
    @media(min-width:640px){.rgrid{grid-template-columns:repeat(auto-fill,minmax(220px,1fr))!important;}}
    .hcard{transition:transform 0.2s ease,box-shadow 0.2s ease;}
    .hcard:hover{transform:translateY(-3px);box-shadow:0 8px 32px rgba(0,0,0,0.3);}
  </style>
</head>

<script type="text/babel">
const {useState,useEffect,useRef}=React;
const SB_URL="https://tkpwseiasagnzerodiwl.supabase.co";
const SB_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRrcHdzZWlhc2Fnbnplcm9kaXdsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk1NzM4OTIsImV4cCI6MjA5NTE0OTg5Mn0.wWN7IXRcEmGiIisR0k9Gc4TkQT6CuLCNF7Qk8_Gl9qQ";
const PIN="0412";
const CATS=["Breakfast","Lunch","Dinner","Snack","Dessert","Other"];
const DAYS=["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];
const MONS=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
const SHOP_GROUPS={"Frozen":["frozen","ice"],"Produce":["onion","garlic","tomato","pepper","carrot","potato","lettuce","spinach","rocket","avocado","lemon","lime","cucumber","mushroom","courgette","broccoli","coriander","parsley","basil","herb","vegetable","veg","salad","spring onion","celery","leek","ginger","chilli","aubergine","corn","pea","edamame","sweetcorn","kale","cabbage"],"Meat & Fish":["chicken","beef","lamb","pork","salmon","tuna","fish","mince","steak","bacon","sausage","tofu","prawns","shrimp","turkey","duck","halloumi"],"Dairy & Eggs":["egg","milk","cream","butter","cheese","parmesan","feta","mozzarella","yogurt","yoghurt","brie","ricotta","cheddar","goat cheese","creme fraiche","mascarpone"],"Pasta & Grains":["pasta","rice","noodle","orzo","gnocchi","quinoa","couscous","bread","flour","oat","muffin","tortilla","wrap","pitta"],"Tins & Jars":["tin","can","canned","chopped tomato","stock","sauce","mayo","ketchup","mustard","vinegar","jam","honey","syrup","soy","peri peri","harissa","miso","tahini","pesto","sriracha","olives","coconut milk"],"Pantry":["oil","salt","pepper","spice","paprika","cumin","turmeric","cinnamon","sugar","cornflour","baking","seasoning","chili flakes","chilli flakes","garlic granules","smoked paprika","dried","curry","garam"]};
function grp(ing){const l=ing.toLowerCase();for(const[g,kw]of Object.entries(SHOP_GROUPS))if(kw.some(k=>l.includes(k)))return g;return"Other";}
function rollingDays(){const a=[];const t=new Date();t.setHours(0,0,0,0);for(let i=-7;i<=7;i++){const d=new Date(t);d.setDate(t.getDate()+i);a.push(d);}return a;}
function dkey(d){return d.toISOString().split("T")[0];}
function monday(d=new Date()){const c=typeof d==="string"?new Date(d+"T12:00:00"):new Date(d);const dy=c.getDay();c.setDate(c.getDate()-dy+(dy===0?-6:1));return c.toISOString().split("T")[0];}
function today(){const d=new Date();d.setHours(0,0,0,0);return dkey(d);}
function fmtDate(s){const d=new Date(s+"T12:00:00");return DAYS[d.getDay()].slice(0,3)+" "+d.getDate()+" "+MONS[d.getMonth()];}
const H={"Content-Type":"application/json","apikey":SB_KEY,"Authorization":"Bearer "+SB_KEY,"Prefer":"return=representation"};
async function sGet(t,q=""){try{const r=await fetch(SB_URL+"/rest/v1/"+t+"?"+q,{headers:H});if(!r.ok)throw r.status;return r.json();}catch(e){console.error(e);return[];}}
async function sPost(t,b){try{const r=await fetch(SB_URL+"/rest/v1/"+t,{method:"POST",headers:H,body:JSON.stringify(b)});if(!r.ok)throw r.status;return r.json();}catch(e){console.error(e);return null;}}
async function sPatch(t,q,b){try{const r=await fetch(SB_URL+"/rest/v1/"+t+"?"+q,{method:"PATCH",headers:H,body:JSON.stringify(b)});if(!r.ok)throw r.status;return r.json();}catch(e){console.error(e);return null;}}
async function sDel(t,q){try{await fetch(SB_URL+"/rest/v1/"+t+"?"+q,{method:"DELETE",headers:H});}catch(e){console.error(e);}}
async function sUps(t,b,oc){try{const r=await fetch(SB_URL+"/rest/v1/"+t+"?on_conflict="+oc,{method:"POST",headers:{...H,"Prefer":"resolution=merge-duplicates,return=representation"},body:JSON.stringify(b)});if(!r.ok)throw r.status;return r.json();}catch(e){return null;}}

const glass={background:"rgba(30,46,36,0.8)",backdropFilter:"blur(16px)",WebkitBackdropFilter:"blur(16px)",border:"1px solid rgba(100,160,100,0.15)",borderRadius:16};
const glassS={background:"rgba(24,38,30,0.95)",backdropFilter:"blur(20px)",WebkitBackdropFilter:"blur(20px)",border:"1px solid rgba(100,160,100,0.18)",borderRadius:16};
const iSt={width:"100%",background:"rgba(16,32,24,0.75)",border:"1px solid rgba(100,160,100,0.2)",borderRadius:10,color:"#e8f0e4",padding:"10px 14px",fontSize:15,fontFamily:"'Syne',sans-serif"};
const lSt={display:"block",fontFamily:"'DM Mono',monospace",fontSize:11,letterSpacing:"0.1em",textTransform:"uppercase",color:"#9ab89a",marginBottom:6,marginTop:14};
const bP={background:"#6db870",border:"none",borderRadius:12,color:"#1a2e20",fontSize:15,fontWeight:700,padding:"13px 0",width:"100%",cursor:"pointer",marginTop:20,fontFamily:"'Syne',sans-serif"};
const bS={background:"rgba(30,46,36,0.8)",border:"1px solid rgba(100,160,100,0.2)",borderRadius:10,color:"#9ab89a",fontSize:13,padding:"8px 16px",cursor:"pointer",fontFamily:"'Syne',sans-serif"};

const TABS=[{id:"library",icon:"📚",label:"Recipes"},{id:"add",icon:"✚",label:"Add"},{id:"planner",icon:"📅",label:"Planner"},{id:"shopping",icon:"🛒",label:"Shopping"}];

function Logo({size=32}){
  return <svg width={size} height={size} viewBox="0 0 80 80" fill="none"><rect width="80" height="80" rx="18" fill="rgba(30,46,36,0.9)"/><rect x="8" y="28" width="26" height="22" rx="6" stroke="#6db870" strokeWidth="2.5" fill="none"/><rect x="46" y="28" width="26" height="22" rx="6" stroke="#6db870" strokeWidth="2.5" fill="none"/><line x1="34" y1="39" x2="46" y2="39" stroke="#6db870" strokeWidth="2.5"/><line x1="8" y1="39" x2="3" y2="39" stroke="#6db870" strokeWidth="2.5" strokeLinecap="round"/><line x1="72" y1="39" x2="77" y2="39" stroke="#6db870" strokeWidth="2.5" strokeLinecap="round"/><rect x="13" y="44" width="4" height="4" rx="1" fill="#6db870" opacity="0.5"/><rect x="19" y="40" width="4" height="8" rx="1" fill="#6db870" opacity="0.8"/><rect x="25" y="36" width="4" height="12" rx="1" fill="#6db870"/><polyline points="51,48 57,42 63,44 69,35" stroke="#c8a84b" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" fill="none"/><circle cx="69" cy="35" r="2.5" fill="#c8a84b"/></svg>;
}

function App(){
  const [pin,setPin]=useState("");
  const [authed,setAuthed]=useState(false);
  const [pinErr,setPinErr]=useState(false);
  const [loading,setLoading]=useState(false);
  const [appLoad,setAppLoad]=useState(false);
  const [connErr,setConnErr]=useState(false);
  const [view,setView]=useState("library");
  const [prev,setPrev]=useState("library");
  const [recipes,setRecipes]=useState([]);
  const [plan,setPlan]=useState({});
  const [sel,setSel]=useState(null);
  const [step,setStep]=useState(0);
  const [ticks,setTicks]=useState({});
  const [ws]=useState(monday());
  const [search,setSearch]=useState("");
  const [pSearch,setPSearch]=useState("");
  const [fCat,setFCat]=useState("All");
  const [fFav,setFFav]=useState(false);
  const [sort,setSort]=useState("newest");
  const [form,setForm]=useState({title:"",category:"Dinner",source_url:"",ingredients:"",steps:"",photo_url:"",servings:2,prep_time:"",cook_time:""});
  const [fErr,setFErr]=useState("");
  const [editF,setEditF]=useState(null);
  const [picker,setPicker]=useState(null);
  const [delC,setDelC]=useState(false);
  const [sCount,setSCount]=useState(null);
  const [custom,setCustom]=useState([]);
  const [newItem,setNewItem]=useState("");
  const [toast,setToast]=useState("");
  const fileRef=useRef(null);
  const tk=today();
  const rDays=rollingDays();

  useEffect(()=>{
    const inner=document.getElementById("bnInner");
    if(!inner||!authed)return;
    inner.innerHTML="";
    TABS.forEach(tab=>{
      const btn=document.createElement("button");
      btn.className="nav-tab"+(view===tab.id?" active":"");
      btn.innerHTML='<span class="nav-tab-icon">'+tab.icon+'</span><span>'+tab.label+'</span>';
      btn.onclick=()=>setView(tab.id);
      inner.appendChild(btn);
    });
  },[view,authed]);

  useEffect(()=>{
    if(!authed)return;
    setAppLoad(true);setConnErr(false);
    try{const s=localStorage.getItem("ci");if(s)setCustom(JSON.parse(s));localStorage.removeItem("pinRemember");}catch(e){}
    const to=setTimeout(()=>{setAppLoad(false);setConnErr(true);},10000);
    Promise.all([fRec(),fPlan(),fTicks()]).then(()=>clearTimeout(to)).finally(()=>{clearTimeout(to);setAppLoad(false);});
  },[authed]);

  useEffect(()=>{
    if(pin.length===4){
      if(pin===PIN)setAuthed(true);
      else{setPinErr(true);setTimeout(()=>{setPinErr(false);setPin("");},800);}
    }
  },[pin]);

  function showT(m){setToast(m);setTimeout(()=>setToast(""),2500);}
  async function fRec(){const d=await sGet("recipes","order=created_at.desc");setRecipes(Array.isArray(d)?d:[]);}
  async function fPlan(){
    const s=rDays[0];const e=rDays[rDays.length-1];
    const d=await sGet("week_plan","date=gte."+dkey(s)+"&date=lte."+dkey(e)+"&select=*,recipes(*)");
    const p={};(Array.isArray(d)?d:[]).forEach(r=>{if(r.date)p[r.date]=r;});setPlan(p);
  }
  async function fTicks(){
    const d=await sGet("shopping_ticks","week_start=eq."+ws+"&ticked=eq.true");
    const t={};(Array.isArray(d)?d:[]).forEach(r=>{t[r.ingredient]=true;});setTicks(t);
  }
  async function toggleTick(ing){
    const nv=!ticks[ing];setTicks(t=>({...t,[ing]:nv}));
    if(nv)await sUps("shopping_ticks",{week_start:ws,ingredient:ing,ticked:true},"week_start,ingredient");
    else await sDel("shopping_ticks","week_start=eq."+ws+"&ingredient=eq."+ing.replace(/&/g,"%26").replace(/=/g,"%3D"));
  }
  async function saveRec(rec){
    setLoading(true);const r=await sPost("recipes",rec);setLoading(false);
    if(!r){showT("Save failed");return;}
    showT("Saved!");fRec();setView("library");
    setForm({title:"",category:"Dinner",source_url:"",ingredients:"",steps:"",photo_url:"",servings:2,prep_time:"",cook_time:""});
    if(fileRef.current)fileRef.current.value="";
  }
  async function saveQ(rec,cb){const r=await sPost("recipes",rec);if(r&&cb)cb();}
  async function delRec(id){
    await sDel("week_plan","recipe_id=eq."+id);await sDel("recipes","id=eq."+id);
    showT("Removed");fRec();fPlan();setSel(null);setDelC(false);setView("library");
  }
  async function assign(dk,rid){
    const ex=plan[dk];
    if(ex)await sPatch("week_plan","id=eq."+ex.id,{recipe_id:rid});
    else await sPost("week_plan",{date:dk,recipe_id:rid,week_start:monday(dk)});
    await fPlan();showT("Added to plan!");
  }
  async function unassign(dk){const ex=plan[dk];if(ex){await sDel("week_plan","id=eq."+ex.id);fPlan();}}
  async function updateRec(id,u){
    setLoading(true);await sPatch("recipes","id=eq."+id,u);setLoading(false);
    showT("Saved!");await fRec();setSel(p=>({...p,...u}));setEditF(null);
  }
  async function toggleFav(r){
    const nv=!r.is_favourite;await sPatch("recipes","id=eq."+r.id,{is_favourite:nv});
    setSel(p=>({...p,is_favourite:nv}));setRecipes(rs=>rs.map(x=>x.id===r.id?{...x,is_favourite:nv}:x));
    showT(nv?"Favourited":"Removed from favourites");
  }
  function handleForm(){
    if(!form.title.trim()){setFErr("Title required");return;}
    saveRec({title:form.title.trim(),category:form.category,source_url:form.source_url.trim()||null,
      photo_url:form.photo_url.trim()||null,ingredients:form.ingredients.split("\n").filter(l=>l.trim()),
      steps:form.steps.split("\n").filter(l=>l.trim()),servings:parseInt(form.servings)||2,
      prep_time:form.prep_time.trim()||null,cook_time:form.cook_time.trim()||null,
      is_favourite:false,rating:0,notes:null});setFErr("");
  }
  function handleUpload(e){
    const files=Array.from(e.target.files);if(!files.length)return;
    let err=0,ok=0;const total=files.length;
    files.forEach(file=>{
      const rd=new FileReader();
      rd.onload=ev=>{
        try{
          const d=JSON.parse(ev.target.result);if(!d.title){err++;return;}
          saveQ({title:d.title,category:d.category||"Dinner",source_url:d.source_url||null,photo_url:d.photo_url||null,
            ingredients:Array.isArray(d.ingredients)?d.ingredients:[],steps:Array.isArray(d.steps)?d.steps:[],
            servings:d.servings||2,prep_time:d.prep_time||null,cook_time:d.cook_time||null,
            is_favourite:false,rating:0,notes:null},
          ()=>{ok++;if(ok+err===total){fRec();setView("library");showT(ok+" recipe"+(ok>1?"s":"")+" saved!");}});
        }catch{err++;}
      };rd.readAsText(file);
    });e.target.value="";
  }
  function scaleIng(ing,s){
    if(s===1)return ing;
    return ing.replace(/(\d+\.?\d*)/g,(m)=>{const n=parseFloat(m)*s;return Number.isInteger(n)?n:Math.round(n*10)/10;});
  }
  function shopGrps(){
    const seen={};
    Object.entries(plan).forEach(([dk,row])=>{
      if(!row?.recipes||dk<tk)return;
      (row.recipes.ingredients||[]).forEach(ing=>{const k=ing.trim().toLowerCase();if(!seen[k])seen[k]=ing.trim();});
    });
    const g={};Object.values(seen).forEach(ing=>{const gg=grp(ing);if(!g[gg])g[gg]=[];g[gg].push(ing);});
    return g;
  }
  const filtered=[...recipes]
    .filter(r=>r.title.toLowerCase().includes(search.toLowerCase())&&(fCat==="All"||r.category===fCat)&&(!fFav||r.is_favourite))
    .sort((a,b)=>sort==="az"?a.title.localeCompare(b.title):sort==="rating"?(b.rating||0)-(a.rating||0):0);
  const tonight=plan[tk]?.recipes;
  const baseS=sel?.servings||2;
  const curS=sCount!==null?sCount:baseS;
  const sScale=curS/baseS;

  // ── PIN ──────────────────────────────────────────────────────────────────
  if(!authed) return (
    <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
      <div style={{...glassS,padding:"48px 32px",maxWidth:340,width:"100%",textAlign:"center"}}>
        <div style={{display:"flex",justifyContent:"center",marginBottom:20}}><Logo size={56}/></div>
        <h1 style={{fontFamily:"'DM Serif Display',serif",fontSize:32,color:"#e8f0e4",lineHeight:1.1,marginBottom:4}}>Our Recipes</h1>
        <p style={{fontFamily:"'DM Mono',monospace",fontSize:10,color:"#3a5a3a",letterSpacing:"0.16em",textTransform:"uppercase",marginBottom:4}}>by DataIsCool</p>
        <p style={{color:"#9ab89a",fontSize:14,marginBottom:26}}>Enter your PIN to continue</p>
        <div style={{display:"flex",gap:10,justifyContent:"center",marginBottom:26}}>
          {[0,1,2,3].map(i=><div key={i} style={{width:14,height:14,borderRadius:"50%",background:pin.length>i?"#6db870":"rgba(80,120,80,0.25)",border:"1px solid rgba(100,160,100,0.25)",transition:"background 0.2s"}}/>)}
        </div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:10,maxWidth:230,margin:"0 auto 20px"}}>
          {[1,2,3,4,5,6,7,8,9,"",0,"⌫"].map((k,i)=>(
            <button key={i} style={{background:pinErr?"rgba(100,30,30,0.5)":"rgba(30,48,36,0.8)",border:"1px solid rgba(100,160,100,"+(pinErr?"0.1)":"0.12)"),borderRadius:12,color:"#e8f0e4",fontSize:22,padding:"14px 0",cursor:k===""?"default":"pointer",opacity:k===""?0:1,fontFamily:"'Syne',sans-serif",transition:"all 0.15s"}}
              onClick={()=>{if(k==="⌫")setPin(p=>p.slice(0,-1));else if(k!==""&&pin.length<4)setPin(p=>p+k);}}>
              {k}
            </button>
          ))}
        </div>
        {pinErr&&<p style={{color:"#c87070",fontSize:13}}>Wrong PIN — try again</p>}
      </div>
    </div>
  );

  if(connErr) return (
    <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",gap:16,padding:24,textAlign:"center"}}>
      <div style={{fontSize:48}}>🌲</div>
      <div style={{fontFamily:"'DM Serif Display',serif",fontSize:24,color:"#e8f0e4"}}>Lost in the woods</div>
      <div style={{color:"#9ab89a",fontSize:14}}>Check your connection and try again</div>
      <button style={{...bP,width:"auto",padding:"12px 32px"}} onClick={()=>{setConnErr(false);setAuthed(false);setPin("");}}>Try again</button>
    </div>
  );

  if(appLoad) return (
    <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",gap:14}}>
      <Logo size={48}/>
      <div style={{fontFamily:"'DM Mono',monospace",color:"#9ab89a",fontSize:12,letterSpacing:"0.08em"}}>Loading your recipes...</div>
    </div>
  );

  // ── COOK ─────────────────────────────────────────────────────────────────
  if(view==="cook"&&sel){
    const steps=sel.steps||[];
    const prog=steps.length===0?100:Math.round(((step+1)/steps.length)*100);
    return (
      <div style={{minHeight:"100vh",maxWidth:680,margin:"0 auto",display:"flex",flexDirection:"column"}}>
        <div style={{...glassS,borderRadius:0,padding:"16px 24px",display:"flex",alignItems:"center",gap:14,borderLeft:"none",borderRight:"none",borderTop:"none"}}>
          <button style={{background:"none",border:"none",color:"#9ab89a",cursor:"pointer",fontSize:14,fontFamily:"'Syne',sans-serif"}} onClick={()=>{setView("detail");setStep(0);}}>← Back</button>
          <span style={{fontFamily:"'DM Serif Display',serif",fontSize:20,color:"#e8f0e4",flex:1}}>{sel.title}</span>
        </div>
        <div style={{height:3,background:"rgba(100,160,100,0.12)"}}><div style={{height:3,background:"#6db870",width:prog+"%",transition:"width 0.3s"}}/></div>
        <div style={{flex:1,padding:"40px 24px 24px",display:"flex",flexDirection:"column"}}>
          {steps.length===0?(
            <div style={{flex:1,display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",gap:12}}>
              <div style={{color:"#9ab89a"}}>No steps yet — Edit to add them.</div>
              <button style={bS} onClick={()=>setView("detail")}>Back to recipe</button>
            </div>
          ):(
            <>
              <div style={{fontFamily:"'DM Mono',monospace",fontSize:11,color:"#6db870",letterSpacing:"0.14em",textTransform:"uppercase",marginBottom:18}}>Step {step+1} of {steps.length}</div>
              <div style={{fontFamily:"'DM Serif Display',serif",fontSize:28,color:"#e8f0e4",lineHeight:1.55,flex:1}}>{steps[step]}</div>
              <div style={{display:"flex",gap:12,marginTop:32,marginBottom:24}}>
                <button style={{...bS,flex:1,opacity:step===0?0.3:1}} disabled={step===0} onClick={()=>setStep(s=>s-1)}>← Prev</button>
                {step<steps.length-1?<button style={{...bS,flex:1}} onClick={()=>setStep(s=>s+1)}>Next →</button>
                  :<button style={{background:"#5cb85c",border:"none",borderRadius:10,color:"#fff",fontSize:14,fontWeight:700,flex:1,cursor:"pointer",fontFamily:"'Syne',sans-serif"}} onClick={()=>{setView("detail");setStep(0);}}>Done ✓</button>}
              </div>
            </>
          )}
          <div style={{...glass,padding:"14px 16px"}}>
            <div style={{fontFamily:"'DM Mono',monospace",fontSize:10,color:"#9ab89a",letterSpacing:"0.1em",textTransform:"uppercase",marginBottom:10}}>Ingredients</div>
            {(sel.ingredients||[]).map((ing,i)=><div key={i} style={{color:"#c8e0b8",fontSize:14,marginBottom:4}}>• {ing}</div>)}
          </div>
        </div>
      </div>
    );
  }

  // ── DETAIL ───────────────────────────────────────────────────────────────
  if(view==="detail"&&sel) return (
    <div style={{minHeight:"100vh",maxWidth:680,margin:"0 auto",paddingBottom:40}}>
      {delC&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.65)",zIndex:200,display:"flex",alignItems:"flex-end",justifyContent:"center"}}>
          <div style={{...glassS,borderRadius:"20px 20px 0 0",padding:"28px 24px 48px",width:"100%",maxWidth:680}}>
            <div style={{fontFamily:"'DM Serif Display',serif",fontSize:24,color:"#e8f0e4",marginBottom:8}}>Remove this recipe?</div>
            <div style={{color:"#9ab89a",fontSize:14,marginBottom:24}}>This cannot be undone.</div>
            <button style={{...bP,marginTop:0,background:"#b85248"}} onClick={()=>delRec(sel.id)}>Yes, remove</button>
            <button style={{...bP,marginTop:10,background:"rgba(30,48,36,0.8)"}} onClick={()=>setDelC(false)}>Cancel</button>
          </div>
        </div>
      )}
      <div style={{...glassS,borderRadius:0,display:"flex",justifyContent:"space-between",alignItems:"center",padding:"14px 20px",position:"sticky",top:0,zIndex:10,borderLeft:"none",borderRight:"none",borderTop:"none"}}>
        <button style={{background:"none",border:"none",color:"#9ab89a",cursor:"pointer",fontSize:14,fontFamily:"'Syne',sans-serif"}} onClick={()=>{setView(prev==="planner"?"planner":"library");setEditF(null);setSCount(null);}}>← Back</button>
        <div style={{display:"flex",gap:12,alignItems:"center"}}>
          <button style={{background:"none",border:"none",fontSize:22,cursor:"pointer",color:sel.is_favourite?"#6db870":"#6a8a6a"}} onClick={()=>toggleFav(sel)}>{sel.is_favourite?"♥":"♡"}</button>
          <button style={bS} onClick={()=>setEditF(editF?null:{title:sel.title,category:sel.category||"Dinner",source_url:sel.source_url||"",photo_url:sel.photo_url||"",ingredients:(sel.ingredients||[]).join("\n"),steps:(sel.steps||[]).join("\n"),servings:sel.servings||2,prep_time:sel.prep_time||"",cook_time:sel.cook_time||"",notes:sel.notes||"",rating:sel.rating||0})}>{editF?"Cancel":"Edit"}</button>
          <button style={{background:"none",border:"none",color:"#b85248",cursor:"pointer",fontSize:14,fontFamily:"'Syne',sans-serif"}} onClick={()=>setDelC(true)}>Remove</button>
        </div>
      </div>
      {editF?(
        <div style={{padding:"20px 20px 80px"}}>
          <h2 style={{fontFamily:"'DM Serif Display',serif",fontSize:28,color:"#e8f0e4",marginBottom:20}}>Edit Recipe</h2>
          <label style={lSt}>Title</label><input style={iSt} value={editF.title} onChange={e=>setEditF(f=>({...f,title:e.target.value}))}/>
          <label style={lSt}>Category</label>
          <select style={iSt} value={editF.category} onChange={e=>setEditF(f=>({...f,category:e.target.value}))}>
            {CATS.map(c=><option key={c}>{c}</option>)}
          </select>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
            <div><label style={lSt}>Prep</label><input style={iSt} value={editF.prep_time} onChange={e=>setEditF(f=>({...f,prep_time:e.target.value}))} placeholder="10 min"/></div>
            <div><label style={lSt}>Cook</label><input style={iSt} value={editF.cook_time} onChange={e=>setEditF(f=>({...f,cook_time:e.target.value}))} placeholder="30 min"/></div>
          </div>
          <label style={lSt}>Servings</label><input style={iSt} type="number" min="1" value={editF.servings} onChange={e=>setEditF(f=>({...f,servings:e.target.value}))}/>
          <label style={lSt}>Photo URL</label><input style={iSt} value={editF.photo_url} onChange={e=>setEditF(f=>({...f,photo_url:e.target.value}))} placeholder="https://..."/>
          <label style={lSt}>Source URL</label><input style={iSt} value={editF.source_url} onChange={e=>setEditF(f=>({...f,source_url:e.target.value}))} placeholder="https://..."/>
          <label style={lSt}>Notes</label><textarea style={{...iSt,resize:"vertical"}} rows={3} value={editF.notes} onChange={e=>setEditF(f=>({...f,notes:e.target.value}))} placeholder="Add more garlic next time!"/>
          <label style={lSt}>Rating</label>
          <div style={{display:"flex",gap:6,marginTop:6}}>
            {[1,2,3,4,5].map(n=><button key={n} onClick={()=>setEditF(f=>({...f,rating:n}))} style={{background:"none",border:"none",fontSize:28,cursor:"pointer",color:n<=editF.rating?"#c8a84b":"rgba(100,150,100,0.2)",padding:0}}>★</button>)}
          </div>
          <label style={lSt}>Ingredients (one per line)</label><textarea style={{...iSt,resize:"vertical"}} rows={6} value={editF.ingredients} onChange={e=>setEditF(f=>({...f,ingredients:e.target.value}))}/>
          <label style={lSt}>Steps (one per line)</label><textarea style={{...iSt,resize:"vertical"}} rows={6} value={editF.steps} onChange={e=>setEditF(f=>({...f,steps:e.target.value}))}/>
          <button style={bP} disabled={loading} onClick={()=>updateRec(sel.id,{title:editF.title.trim(),category:editF.category,source_url:editF.source_url.trim()||null,photo_url:editF.photo_url.trim()||null,ingredients:editF.ingredients.split("\n").filter(l=>l.trim()),steps:editF.steps.split("\n").filter(l=>l.trim()),servings:parseInt(editF.servings)||2,prep_time:editF.prep_time.trim()||null,cook_time:editF.cook_time.trim()||null,notes:editF.notes.trim()||null,rating:editF.rating||0})}>{loading?"Saving...":"Save Changes"}</button>
        </div>
      ):(
        <>
          {sel.photo_url&&<img src={sel.photo_url} alt={sel.title} style={{width:"100%",height:260,objectFit:"cover"}} loading="lazy"/>}
          <div style={{padding:"22px 20px 40px"}}>
            <div style={{fontSize:12,color:"#9ab89a",marginBottom:8,fontFamily:"'DM Mono',monospace",letterSpacing:"0.06em"}}>{sel.category}</div>
            <div style={{display:"flex",alignItems:"flex-start",gap:12,marginBottom:12}}>
              <h2 style={{fontFamily:"'DM Serif Display',serif",fontSize:34,color:"#e8f0e4",lineHeight:1.1,flex:1}}>{sel.title}</h2>
              {sel.rating>0&&<div style={{color:"#c8a84b",fontSize:18,marginTop:6,flexShrink:0}}>{"★".repeat(sel.rating)}</div>}
            </div>
            {(sel.prep_time||sel.cook_time)&&<div style={{display:"flex",gap:16,marginBottom:14,color:"#9ab89a",fontSize:13,fontFamily:"'DM Mono',monospace"}}>{sel.prep_time&&<span>⏱ {sel.prep_time}</span>}{sel.cook_time&&<span>🍳 {sel.cook_time}</span>}</div>}
            {sel.notes&&<div style={{...glass,padding:"12px 16px",marginBottom:14,color:"#9ab89a",fontSize:14,fontStyle:"italic",lineHeight:1.5}}>💬 {sel.notes}</div>}
            {sel.source_url&&<a href={sel.source_url} target="_blank" rel="noopener noreferrer" style={{color:"#6db870",fontSize:13,display:"block",marginBottom:14}}>View original ↗</a>}
            <div style={{...glass,display:"flex",alignItems:"center",gap:12,padding:"12px 16px",marginBottom:4}}>
              <span style={{fontFamily:"'DM Mono',monospace",fontSize:12,color:"#9ab89a",flex:1}}>Servings</span>
              <button onClick={()=>setSCount(s=>Math.max(1,(s!==null?s:baseS)-1))} style={{background:"rgba(20,40,28,0.8)",border:"1px solid rgba(100,160,100,0.18)",color:"#e8f0e4",borderRadius:8,width:34,height:34,cursor:"pointer",fontSize:18}}>−</button>
              <span style={{color:"#e8f0e4",fontSize:18,fontWeight:700,minWidth:28,textAlign:"center"}}>{curS}</span>
              <button onClick={()=>setSCount(s=>(s!==null?s:baseS)+1)} style={{background:"rgba(20,40,28,0.8)",border:"1px solid rgba(100,160,100,0.18)",color:"#e8f0e4",borderRadius:8,width:34,height:34,cursor:"pointer",fontSize:18}}>+</button>
              {sCount!==null&&<button onClick={()=>setSCount(null)} style={{background:"none",border:"none",color:"#6a8a6a",fontSize:12,cursor:"pointer",fontFamily:"'Syne',sans-serif"}}>Reset</button>}
            </div>
            <div style={{fontFamily:"'DM Serif Display',serif",fontSize:18,color:"#e8f0e4",marginTop:22,marginBottom:10,borderBottom:"1px solid rgba(100,160,100,0.1)",paddingBottom:8}}>Ingredients</div>
            {(sel.ingredients||[]).map((ing,i)=><div key={i} style={{color:"#c8e0b8",fontSize:15,marginBottom:7,lineHeight:1.5}}>• {scaleIng(ing,sScale)}</div>)}
            <div style={{fontFamily:"'DM Serif Display',serif",fontSize:18,color:"#e8f0e4",marginTop:22,marginBottom:10,borderBottom:"1px solid rgba(100,160,100,0.1)",paddingBottom:8}}>Steps</div>
            {(sel.steps||[]).length===0?<div style={{color:"#9ab89a",fontSize:14,fontStyle:"italic"}}>No steps yet — tap Edit to add them.</div>
              :(sel.steps||[]).map((s,i)=><div key={i} style={{display:"flex",gap:12,marginBottom:12,color:"#c8e0b8",fontSize:15,lineHeight:1.55}}><span style={{background:"#6db870",color:"#1a2e20",borderRadius:"50%",width:26,height:26,display:"inline-flex",alignItems:"center",justifyContent:"center",fontSize:12,flexShrink:0,marginTop:2,fontWeight:700}}>{i+1}</span>{s}</div>)}
            <div style={{fontFamily:"'DM Serif Display',serif",fontSize:18,color:"#e8f0e4",marginTop:22,marginBottom:10,borderBottom:"1px solid rgba(100,160,100,0.1)",paddingBottom:8}}>Plan this meal</div>
            <div style={{display:"flex",gap:8,overflowX:"auto",paddingBottom:8,marginBottom:22}}>
              {rDays.map(d=>{
                const dk=dkey(d);const isT=dk===tk;const isP=plan[dk]?.recipe_id===sel.id;
                return <div key={dk} onClick={()=>assign(dk,sel.id)} style={{flexShrink:0,textAlign:"center",cursor:"pointer",padding:"9px 11px",borderRadius:12,minWidth:52,transition:"all 0.15s",background:isP?"#6db870":isT?"rgba(109,184,112,0.12)":"rgba(30,48,36,0.6)",border:isT?"1px solid rgba(109,184,112,0.4)":"1px solid rgba(100,160,100,0.1)"}}>
                  <div style={{fontFamily:"'DM Mono',monospace",fontSize:9,color:isP?"#1a2e20":"#9ab89a",letterSpacing:"0.08em"}}>{DAYS[d.getDay()].slice(0,3).toUpperCase()}</div>
                  <div style={{fontSize:16,fontWeight:700,color:isP?"#1a2e20":isT?"#6db870":"#e8f0e4",marginTop:2}}>{d.getDate()}</div>
                </div>;
              })}
            </div>
            <button style={{...bP,fontSize:16}} onClick={()=>{setStep(0);setView("cook");}}>🍳 Start Cooking</button>
          </div>
        </>
      )}
    </div>
  );

  // ── MAIN ─────────────────────────────────────────────────────────────────
  return (
    <div style={{minHeight:"100vh",display:"flex",flexDirection:"column"}}>
      {toast&&<div style={{position:"fixed",top:20,left:"50%",transform:"translateX(-50%)",background:"rgba(24,38,30,0.97)",backdropFilter:"blur(12px)",border:"1px solid rgba(109,184,112,0.25)",color:"#e8f0e4",padding:"10px 22px",borderRadius:20,fontSize:14,zIndex:200,whiteSpace:"nowrap",fontWeight:600,fontFamily:"'Syne',sans-serif",boxShadow:"0 4px 20px rgba(0,0,0,0.4)"}}>{toast}</div>}

      <div style={{...glassS,borderRadius:0,padding:"14px 24px",display:"flex",alignItems:"center",justifyContent:"space-between",position:"sticky",top:0,zIndex:10,borderLeft:"none",borderRight:"none",borderTop:"none"}}>
        <div style={{display:"flex",alignItems:"center",gap:12}}>
          <Logo size={32}/>
          <span style={{fontFamily:"'DM Serif Display',serif",fontSize:20,color:"#e8f0e4"}}>Our Recipes</span>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:8}}>
          <div className="top-tabs" style={{gap:2}}>
            {TABS.map(tab=>(
              <button key={tab.id} onClick={()=>setView(tab.id)} style={{background:"none",border:"none",padding:"8px 14px",cursor:"pointer",fontFamily:"'DM Mono',monospace",fontSize:11,letterSpacing:"0.1em",textTransform:"uppercase",color:view===tab.id?"#6db870":"#6a8a6a",borderBottom:view===tab.id?"2px solid #6db870":"2px solid transparent",transition:"all 0.15s"}}>
                {tab.icon} {tab.label}
              </button>
            ))}
          </div>
          <a href="/" style={{fontFamily:"'DM Mono',monospace",fontSize:10,color:"#3a5a3a",textDecoration:"none",letterSpacing:"0.08em",whiteSpace:"nowrap",marginLeft:8}}>← Hub</a>
        </div>
      </div>

      <div className="main-content" style={{flex:1,maxWidth:860,margin:"0 auto",width:"100%",padding:"24px 20px 40px"}}>

        {view==="library"&&(
          <div>
            {tonight?(
              <div onClick={()=>{setSel(tonight);setPrev("library");setSCount(null);setView("detail");}}
                style={{...glass,padding:"16px 18px",marginBottom:20,cursor:"pointer",display:"flex",alignItems:"center",gap:14,borderColor:"rgba(109,184,112,0.3)"}} className="hcard">
                {tonight.photo_url?<img src={tonight.photo_url} alt="" style={{width:54,height:54,borderRadius:10,objectFit:"cover",flexShrink:0}} loading="lazy"/>
                  :<div style={{width:54,height:54,borderRadius:10,background:"rgba(20,40,28,0.6)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:24,flexShrink:0}}>🍴</div>}
                <div style={{flex:1}}>
                  <div style={{fontFamily:"'DM Mono',monospace",fontSize:10,color:"#6db870",letterSpacing:"0.1em",textTransform:"uppercase",marginBottom:4}}>● Tonight's dinner</div>
                  <div style={{fontFamily:"'DM Serif Display',serif",fontSize:20,color:"#e8f0e4"}}>{tonight.title}</div>
                </div>
                <div style={{color:"#9ab89a",fontSize:20}}>→</div>
              </div>
            ):(
              <div onClick={()=>setView("planner")} style={{...glass,padding:"16px 18px",marginBottom:20,cursor:"pointer",display:"flex",alignItems:"center",gap:12}} className="hcard">
                <span style={{fontSize:24}}>📅</span>
                <span style={{color:"#9ab89a",fontSize:15}}>Nothing planned for tonight — tap to add</span>
              </div>
            )}
            <div style={{display:"flex",gap:10,marginBottom:14}}>
              <input style={{...iSt,flex:1}} placeholder="Search recipes..." value={search} onChange={e=>setSearch(e.target.value)}/>
              <select value={sort} onChange={e=>setSort(e.target.value)} style={{...iSt,width:"auto",flex:"none",padding:"10px 10px"}}>
                <option value="newest">Newest</option>
                <option value="az">A–Z</option>
                <option value="rating">Rating</option>
              </select>
            </div>
            <div style={{display:"flex",gap:8,overflowX:"auto",paddingBottom:8,marginBottom:18}}>
              {[{id:"fav",label:"♥ Faves",on:fFav},...["All",...CATS].map(c=>({id:c,label:c,on:fCat===c&&!fFav}))].map(f=>(
                <button key={f.id} onClick={()=>{if(f.id==="fav"){setFFav(v=>!v);setFCat("All");}else{setFCat(f.id);setFFav(false);}}}
                  style={{background:f.on?"rgba(109,184,112,0.12)":"rgba(24,40,30,0.7)",border:f.on?"1px solid rgba(109,184,112,0.3)":"1px solid rgba(100,160,100,0.1)",borderRadius:20,padding:"7px 16px",fontSize:13,cursor:"pointer",whiteSpace:"nowrap",flexShrink:0,color:f.on?"#6db870":"#9ab89a",fontFamily:"'Syne',sans-serif",transition:"all 0.15s"}}>
                  {f.label}
                </button>
              ))}
            </div>
            {filtered.length===0&&<div style={{textAlign:"center",marginTop:60,color:"#9ab89a",fontSize:15}}>{recipes.length===0?"No recipes yet — add your first one!":"Nothing matches."}</div>}
            <div className="rgrid" style={{display:"grid",gap:16}}>
              {filtered.map(r=>{
                const up=Object.entries(plan).filter(([k,v])=>v?.recipe_id===r.id&&k>=tk).map(([k])=>k);
                return (
                  <div key={r.id} style={{...glass,overflow:"hidden",position:"relative"}} className="hcard"
                    onClick={()=>{setSel(r);setPrev("library");setSCount(null);setView("detail");}}>
                    {r.is_favourite&&<div style={{position:"absolute",top:8,right:10,fontSize:15,color:"#6db870",zIndex:1,textShadow:"0 1px 6px rgba(0,0,0,0.6)"}}>♥</div>}
                    {r.photo_url?<img src={r.photo_url} alt={r.title} style={{width:"100%",height:140,objectFit:"cover"}} loading="lazy"/>
                      :<div style={{width:"100%",height:140,background:"rgba(16,34,24,0.7)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:44}}>🍴</div>}
                    <div style={{padding:"12px 14px 14px"}}>
                      <div style={{fontSize:11,color:"#9ab89a",marginBottom:6,fontFamily:"'DM Mono',monospace",letterSpacing:"0.05em"}}>{r.category}</div>
                      <div style={{fontFamily:"'DM Serif Display',serif",fontSize:18,color:"#e8f0e4",lineHeight:1.25,marginBottom:5}}>{r.title}</div>
                      {(r.prep_time||r.cook_time)&&<div style={{fontFamily:"'DM Mono',monospace",fontSize:10,color:"#6a8a6a",marginBottom:4}}>{[r.prep_time&&"⏱ "+r.prep_time,r.cook_time&&"🍳 "+r.cook_time].filter(Boolean).join("  ·  ")}</div>}
                      {up.length>0&&<div style={{fontSize:11,color:"#6db870",marginTop:3}}>📅 {up.length>1?up.length+" days planned":fmtDate(up[0])}</div>}
                      {r.rating>0&&<div style={{color:"#c8a84b",fontSize:11,marginTop:3}}>{"★".repeat(r.rating)}</div>}
                    </div>
                  </div>
                );
              })}
            </div>
          </div>
        )}

        {view==="add"&&(
          <div style={{maxWidth:540}}>
            <h2 style={{fontFamily:"'DM Serif Display',serif",fontSize:32,color:"#e8f0e4",marginBottom:8}}>Add a Recipe</h2>
            <p style={{color:"#9ab89a",fontSize:14,marginBottom:22,lineHeight:1.6}}>Upload a JSON file from Claude, or fill in the form below.</p>
            <div style={{...glass,padding:20,marginBottom:20,textAlign:"center"}}>
              <div style={{fontSize:26,marginBottom:8}}>📎</div>
              <div style={{fontFamily:"'DM Serif Display',serif",fontSize:18,color:"#e8f0e4",marginBottom:6}}>Upload from Claude</div>
              <div style={{color:"#9ab89a",fontSize:13,marginBottom:14,lineHeight:1.5}}>Paste a recipe link in this Claude chat, download the JSON, then upload here. Select multiple files at once.</div>
              <label style={{...bP,display:"inline-block",width:"auto",padding:"11px 28px",marginTop:0,cursor:"pointer"}}>
                Choose files
                <input ref={fileRef} type="file" accept=".json" multiple style={{display:"none"}} onChange={handleUpload}/>
              </label>
            </div>
            <div style={{display:"flex",alignItems:"center",gap:12,margin:"20px 0",color:"#6a8a6a",fontSize:13}}>
              <div style={{flex:1,height:1,background:"rgba(100,160,100,0.1)"}}/>
              or fill in manually
              <div style={{flex:1,height:1,background:"rgba(100,160,100,0.1)"}}/>
            </div>
            <label style={lSt}>Title *</label><input style={iSt} value={form.title} onChange={e=>setForm(f=>({...f,title:e.target.value}))} placeholder="e.g. Pasta Carbonara"/>
            <label style={lSt}>Category</label>
            <select style={iSt} value={form.category} onChange={e=>setForm(f=>({...f,category:e.target.value}))}>
              {CATS.map(c=><option key={c}>{c}</option>)}
            </select>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
              <div><label style={lSt}>Prep time</label><input style={iSt} value={form.prep_time} onChange={e=>setForm(f=>({...f,prep_time:e.target.value}))} placeholder="10 min"/></div>
              <div><label style={lSt}>Cook time</label><input style={iSt} value={form.cook_time} onChange={e=>setForm(f=>({...f,cook_time:e.target.value}))} placeholder="30 min"/></div>
            </div>
            <label style={lSt}>Servings</label><input style={iSt} type="number" min="1" value={form.servings} onChange={e=>setForm(f=>({...f,servings:e.target.value}))}/>
            <label style={lSt}>Source URL</label><input style={iSt} value={form.source_url} onChange={e=>setForm(f=>({...f,source_url:e.target.value}))} placeholder="https://..."/>
            <label style={lSt}>Photo URL</label><input style={iSt} value={form.photo_url} onChange={e=>setForm(f=>({...f,photo_url:e.target.value}))} placeholder="https://..."/>
            <label style={lSt}>Ingredients (one per line)</label>
            <textarea style={{...iSt,resize:"vertical"}} value={form.ingredients} onChange={e=>setForm(f=>({...f,ingredients:e.target.value}))} placeholder={"200g pasta\n2 eggs\n100g pancetta"} rows={5}/>
            <label style={lSt}>Steps (one per line)</label>
            <textarea style={{...iSt,resize:"vertical"}} value={form.steps} onChange={e=>setForm(f=>({...f,steps:e.target.value}))} placeholder={"Boil pasta\nFry pancetta\nMix eggs"} rows={5}/>
            {fErr&&<div style={{color:"#c87070",marginBottom:8,fontSize:14}}>{fErr}</div>}
            <button style={bP} onClick={handleForm} disabled={loading}>{loading?"Saving...":"Save Recipe"}</button>
          </div>
        )}

        {view==="planner"&&(
          <div>
            <h2 style={{fontFamily:"'DM Serif Display',serif",fontSize:32,color:"#e8f0e4",marginBottom:22}}>Meal Planner</h2>
            <div style={{display:"flex",flexDirection:"column",gap:10}}>
              {rDays.map(d=>{
                const dk=dkey(d);const row=plan[dk];const rec=row?.recipes;
                const isT=dk===tk;const isP=dk<tk;
                return (
                  <div key={dk} style={{...glass,padding:"14px 16px",display:"flex",alignItems:"center",gap:12,opacity:isP?0.45:1,...(isT?{background:"rgba(109,184,112,0.08)",borderColor:"rgba(109,184,112,0.28)"}:{})}}>
                    <div style={{width:62,flexShrink:0}}>
                      <div style={{fontFamily:"'DM Mono',monospace",fontSize:11,fontWeight:700,color:isT?"#6db870":"#9ab89a",letterSpacing:"0.07em"}}>{DAYS[d.getDay()].slice(0,3).toUpperCase()}{isT&&<span style={{display:"block",fontSize:8,color:"#6db870"}}>TODAY</span>}</div>
                      <div style={{fontFamily:"'DM Mono',monospace",fontSize:11,color:"#6a8a6a"}}>{d.getDate()} {MONS[d.getMonth()]}</div>
                    </div>
                    {rec?(
                      <div style={{flex:1,display:"flex",alignItems:"center",gap:10}}>
                        {rec.photo_url?<img src={rec.photo_url} alt="" style={{width:44,height:44,borderRadius:8,objectFit:"cover",flexShrink:0}} loading="lazy"/>
                          :<div style={{width:44,height:44,borderRadius:8,background:"rgba(20,40,28,0.7)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:20,flexShrink:0}}>🍴</div>}
                        <div style={{flex:1,minWidth:0}}>
                          <div style={{color:"#e8f0e4",fontSize:14,cursor:"pointer",fontFamily:"'DM Serif Display',serif",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}
                            onClick={()=>{setSel(rec);setPrev("planner");setSCount(null);setView("detail");}}>{rec.title}</div>
                          {isT&&<div onClick={()=>{showT("Logged! 🍳");}} style={{fontFamily:"'DM Mono',monospace",fontSize:10,color:"#5cb85c",cursor:"pointer",marginTop:3,letterSpacing:"0.05em"}}>✓ Mark as cooked</div>}
                        </div>
                        {!isP&&<button onClick={()=>unassign(dk)} style={{background:"none",border:"none",color:"#6a8a6a",fontSize:16,cursor:"pointer",padding:"6px",flexShrink:0}}>✕</button>}
                      </div>
                    ):!isP&&(
                      <button onClick={()=>{setPicker(dk);setPSearch("");}}
                        style={{background:"rgba(20,38,28,0.6)",border:"1px dashed rgba(109,184,112,0.22)",borderRadius:10,color:"#6a8a6a",fontSize:14,padding:"10px 18px",cursor:"pointer",display:"flex",alignItems:"center",gap:8,fontFamily:"'Syne',sans-serif",transition:"all 0.15s"}}>
                        <span style={{color:"#6db870",fontSize:18}}>+</span> Add dinner
                      </button>
                    )}
                  </div>
                );
              })}
            </div>
            {picker&&(
              <div style={{position:"fixed",inset:0,background:"rgba(18,32,24,0.97)",backdropFilter:"blur(20px)",zIndex:50,display:"flex",flexDirection:"column"}}>
                <div style={{...glassS,borderRadius:0,padding:"16px 24px",display:"flex",alignItems:"center",justifyContent:"space-between",flexShrink:0,borderLeft:"none",borderRight:"none",borderTop:"none"}}>
                  <div>
                    <div style={{fontFamily:"'DM Mono',monospace",fontSize:10,color:"#9ab89a",letterSpacing:"0.1em",textTransform:"uppercase",marginBottom:2}}>Choose for</div>
                    <div style={{fontFamily:"'DM Serif Display',serif",fontSize:20,color:"#e8f0e4"}}>{DAYS[new Date(picker+"T12:00:00").getDay()]} {new Date(picker+"T12:00:00").getDate()} {MONS[new Date(picker+"T12:00:00").getMonth()]}</div>
                  </div>
                  <button onClick={()=>setPicker(null)} style={{background:"rgba(30,46,36,0.8)",border:"1px solid rgba(100,160,100,0.15)",borderRadius:10,color:"#9ab89a",fontSize:20,cursor:"pointer",width:40,height:40,display:"flex",alignItems:"center",justifyContent:"center"}}>✕</button>
                </div>
                <div style={{padding:"14px 24px 8px",flexShrink:0}}>
                  <input style={iSt} placeholder="Search recipes..." value={pSearch} onChange={e=>setPSearch(e.target.value)} autoFocus/>
                </div>
                <div style={{overflowY:"auto",flex:1,padding:"8px 24px 24px"}}>
                  <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(160px,1fr))",gap:14}}>
                    {recipes.filter(r=>r.title.toLowerCase().includes(pSearch.toLowerCase())).map(r=>(
                      <div key={r.id} onClick={()=>{assign(picker,r.id);setPicker(null);}} style={{...glass,overflow:"hidden",cursor:"pointer"}} className="hcard">
                        {r.photo_url?<img src={r.photo_url} alt="" style={{width:"100%",height:110,objectFit:"cover"}} loading="lazy"/>
                          :<div style={{width:"100%",height:110,background:"rgba(16,34,24,0.7)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:34}}>🍴</div>}
                        <div style={{padding:"10px 12px 12px"}}>
                          <div style={{fontSize:10,color:"#9ab89a",marginBottom:4,fontFamily:"'DM Mono',monospace"}}>{r.category}</div>
                          <div style={{fontFamily:"'DM Serif Display',serif",fontSize:15,color:"#e8f0e4",lineHeight:1.3}}>{r.title}</div>
                        </div>
                      </div>
                    ))}
                  </div>
                </div>
              </div>
            )}
          </div>
        )}

        {view==="shopping"&&(
          <div>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-end",marginBottom:22}}>
              <div>
                <h2 style={{fontFamily:"'DM Serif Display',serif",fontSize:32,color:"#e8f0e4"}}>Shopping List</h2>
                <p style={{color:"#9ab89a",fontSize:13,marginTop:4}}>Synced for both of you · resets each week</p>
              </div>
              {Object.keys(ticks).length>0&&(
                <button onClick={async()=>{await sDel("shopping_ticks","week_start=eq."+ws);setTicks({});setCustom([]);try{localStorage.removeItem("ci");}catch(e){}showT("Cleared!");}} style={bS}>Clear all</button>
              )}
            </div>
            {(()=>{
              const gs=shopGrps();
              const all=[...Object.keys(SHOP_GROUPS),"Other"].filter(g=>gs[g]?.length>0);
              const hasItems=all.length>0||custom.length>0;
              if(!hasItems) return (
                <div style={{textAlign:"center",marginTop:60}}>
                  <div style={{fontSize:52,marginBottom:14}}>🛒</div>
                  <div style={{fontFamily:"'DM Serif Display',serif",fontSize:22,color:"#e8f0e4",marginBottom:8}}>Your list is empty</div>
                  <div style={{color:"#9ab89a",fontSize:14,marginBottom:22}}>Plan your week and it fills up automatically</div>
                  <button onClick={()=>setView("planner")} style={{...bP,width:"auto",padding:"12px 32px"}}>Go to planner</button>
                </div>
              );
              return (
                <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(250px,1fr))",gap:16}}>
                  {all.map(g=>{
                    const ings=gs[g];
                    const ut=ings.filter(i=>!ticks[i]);
                    const tk2=ings.filter(i=>ticks[i]);
                    return (
                      <div key={g} style={{...glass,padding:"16px 18px"}}>
                        <div style={{fontFamily:"'DM Serif Display',serif",fontSize:17,color:"#e8f0e4",marginBottom:12,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                          {g}
                          {tk2.length>0&&<span style={{fontFamily:"'DM Mono',monospace",fontSize:10,color:"#6a8a6a"}}>{tk2.length}/{ings.length}</span>}
                        </div>
                        {ut.map((ing,i)=>(
                          <div key={i} style={{display:"flex",alignItems:"center",gap:12,padding:"9px 0",borderBottom:"1px solid rgba(100,160,100,0.07)",cursor:"pointer"}} onClick={()=>toggleTick(ing)}>
                            <div style={{width:22,height:22,borderRadius:6,border:"1.5px solid rgba(100,160,100,0.28)",flexShrink:0}}></div>
                            <span style={{color:"#c8e0b8",fontSize:14}}>{ing}</span>
                          </div>
                        ))}
                        {tk2.map((ing,i)=>(
                          <div key={i} style={{display:"flex",alignItems:"center",gap:12,padding:"9px 0",borderBottom:"1px solid rgba(100,160,100,0.07)",cursor:"pointer"}} onClick={()=>toggleTick(ing)}>
                            <div style={{width:22,height:22,borderRadius:6,background:"#5cb85c",border:"1.5px solid #5cb85c",flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,color:"#fff"}}>✓</div>
                            <span style={{textDecoration:"line-through",color:"#6a8a6a",fontSize:14}}>{ing}</span>
                          </div>
                        ))}
                      </div>
                    );
                  })}
                  <div style={{...glass,padding:"16px 18px"}}>
                    <div style={{fontFamily:"'DM Serif Display',serif",fontSize:17,color:"#e8f0e4",marginBottom:12}}>Extra items</div>
                    {custom.map((item,i)=>(
                      <div key={i} style={{display:"flex",alignItems:"center",gap:10,padding:"9px 0",borderBottom:"1px solid rgba(100,160,100,0.07)"}}>
                        <div style={{flex:1,display:"flex",alignItems:"center",gap:10,cursor:"pointer"}} onClick={()=>toggleTick("__c__"+item)}>
                          <div style={{width:22,height:22,borderRadius:6,...(ticks["__c__"+item]?{background:"#5cb85c",border:"1.5px solid #5cb85c"}:{border:"1.5px solid rgba(100,160,100,0.28)"}),flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,color:"#fff"}}>{ticks["__c__"+item]?"✓":""}</div>
                          <span style={{textDecoration:ticks["__c__"+item]?"line-through":"none",color:ticks["__c__"+item]?"#6a8a6a":"#c8e0b8",fontSize:14}}>{item}</span>
                        </div>
                        <button onClick={()=>{const u=custom.filter((_,idx)=>idx!==i);setCustom(u);try{localStorage.setItem("ci",JSON.stringify(u));}catch(e){}}} style={{background:"none",border:"none",color:"#6a8a6a",fontSize:16,cursor:"pointer",padding:"2px 6px"}}>✕</button>
                      </div>
                    ))}
                    <div style={{display:"flex",gap:8,marginTop:12}}>
                      <input style={{...iSt,flex:1,padding:"9px 12px",fontSize:13}} value={newItem} onChange={e=>setNewItem(e.target.value)}
                        onKeyDown={e=>{if(e.key==="Enter"&&newItem.trim()){const u=[...custom,newItem.trim()];setCustom(u);setNewItem("");try{localStorage.setItem("ci",JSON.stringify(u));}catch(ex){}}}}
                        placeholder="Add anything..."/>
                      <button onClick={()=>{if(!newItem.trim())return;const u=[...custom,newItem.trim()];setCustom(u);setNewItem("");try{localStorage.setItem("ci",JSON.stringify(u));}catch(e){}}}
                        style={{background:"#6db870",border:"none",borderRadius:10,color:"#1a2e20",fontWeight:700,fontSize:20,width:44,height:44,cursor:"pointer",flexShrink:0}}>+</button>
                    </div>
                  </div>
                </div>
              );
            })()}
          </div>
        )}

      </div>

      <div style={{borderTop:"1px solid rgba(100,160,100,0.08)",padding:"14px 24px",display:"flex",justifyContent:"space-between",maxWidth:860,margin:"0 auto",width:"100%"}}>
        <span style={{fontFamily:"'DM Mono',monospace",fontSize:11,color:"#3a5a3a",letterSpacing:"0.06em"}}>dataiscool.com/Recipes</span>
        <span style={{fontFamily:"'DM Mono',monospace",fontSize:11,color:"#3a5a3a",opacity:0.5}}>made with Claude</span>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
