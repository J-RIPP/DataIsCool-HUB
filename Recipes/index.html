<!DOCTYPE html>
<html lang="en">
<head>

  <style>
    :root {
      --sky:     #b8d4b0;
      --bg:      #1e3028;
      --bg2:     #243830;
      --card:    #2a4038;
      --card2:   #304840;
      --border:  #3a5848;
      --border2: #4a6858;
      --accent:  #6db870;
      --accentL: #8dd090;
      --gold:    #c8a84b;
      --text:    #e8f0e4;
      --textSub: #9ab89a;
      --textMuted: #6a8a6a;
      --textFaint: #3a5a3a;
      --danger:  #b85248;
      --done:    #5cb85c;
    }
    *, *::before, *::after { box-sizing: border-box; margin:0; padding:0; }
    html { scroll-behavior: smooth; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Syne', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }
    input, select, textarea, button { font-family: 'Syne', sans-serif; outline: none; }

    /* ── Sky + atmosphere ── */
    .world {
      position: fixed; inset: 0; z-index: 0; pointer-events: none; overflow: hidden;
    }
    /* Sky gradient — pale lime at top fading to forest green */
    .world::before {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(
        to bottom,
        #c8e0a8 0%,
        #a0c890 8%,
        #70a870 18%,
        #3a6848 35%,
        #243830 55%,
        #1a2e24 100%
      );
    }
    /* Mist layer */
    .world::after {
      content: '';
      position: absolute; inset: 0;
      background: radial-gradient(ellipse 120% 40% at 50% 20%, rgba(180,220,160,0.18) 0%, transparent 70%),
                  radial-gradient(ellipse 80% 30% at 20% 30%, rgba(160,200,140,0.10) 0%, transparent 60%),
                  radial-gradient(ellipse 60% 20% at 80% 25%, rgba(200,168,75,0.06) 0%, transparent 50%);
    }
    /* Birds */
    .birds {
      position: absolute; top: 6%; left: 50%; transform: translateX(-10%);
      opacity: 0.35;
    }
    /* Mountain layers */
    .mountains { position: absolute; bottom: 0; left: 0; width: 100%; }
    .mountains svg { display: block; width: 100%; }
    /* Dark ground overlay so content is readable */
    .ground-fade {
      position: absolute; bottom: 0; left: 0; right: 0; height: 75%;
      background: linear-gradient(to top, var(--bg) 0%, var(--bg) 30%, rgba(30,48,40,0.9) 55%, transparent 100%);
    }

    #root { position: relative; z-index: 1; }

    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

    /* ── Responsive nav ── */
    .bottom-nav {
      display: none;
      position: fixed; bottom: 0; left: 0; right: 0;
      background: rgba(30,48,40,0.95);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-top: 1px solid var(--border);
      z-index: 50;
      padding-bottom: env(safe-area-inset-bottom, 0);
    }
    .bottom-nav-inner {
      display: flex; max-width: 480px; margin: 0 auto;
    }
    .nav-tab {
      flex: 1; display: flex; flex-direction: column; align-items: center;
      gap: 4px; padding: 10px 0 12px; cursor: pointer;
      background: none; border: none; color: var(--textMuted);
      font-family: 'DM Mono', monospace; font-size: 9px;
      letter-spacing: 0.08em; text-transform: uppercase;
      transition: color 0.15s;
    }
    .nav-tab.active { color: var(--accent); }
    .nav-tab-icon { font-size: 22px; line-height: 1; }
    .top-tabs { display: flex; }
    @media (max-width: 639px) {
      .bottom-nav { display: block; }
      .top-tabs { display: none; }
      .content-area { padding-bottom: 80px !important; }
    }
    @media (min-width: 640px) {
      .recipe-grid { grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)) !important; }
    }
    @media (max-width: 639px) {
      .recipe-grid { grid-template-columns: 1fr 1fr !important; }
    }

    /* ── Hover cards ── */
    .hcard { transition: transform 0.2s ease, box-shadow 0.2s ease; cursor: pointer; }
    .hcard:hover { transform: translateY(-3px); box-shadow: 0 8px 32px rgba(0,0,0,0.3); }

    /* ── Fade in ── */
    @keyframes fadeUp {
      from { opacity:0; transform:translateY(10px); }
      to   { opacity:1; transform:translateY(0); }
    }
    .fade-in { animation: fadeUp 0.4s ease forwards; }
  </style>
</head>

<script type="text/babel">
  const { useState, useEffect, useRef } = React;

  const SB_URL = "https://tkpwseiasagnzerodiwl.supabase.co";
  const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRrcHdzZWlhc2Fnbnplcm9kaXdsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk1NzM4OTIsImV4cCI6MjA5NTE0OTg5Mn0.wWN7IXRcEmGiIisR0k9Gc4TkQT6CuLCNF7Qk8_Gl9qQ";

  const DAY_NAMES = ["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];
  const SHORT_MONTHS = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];

  const SHOP_GROUPS = {
    "Frozen": ["frozen","ice"],
    "Produce": ["onion","garlic","tomato","pepper","carrot","potato","lettuce","spinach","rocket","avocado","lemon","lime","cucumber","mushroom","courgette","broccoli","coriander","parsley","basil","herb","vegetable","veg","salad","spring onion","celery","leek","ginger","chilli","aubergine","corn","pea","edamame","sweetcorn","kale","cabbage"],
    "Meat & Fish": ["chicken","beef","lamb","pork","salmon","tuna","fish","mince","steak","bacon","sausage","tofu","prawns","shrimp","turkey","duck","halloumi"],
    "Dairy & Eggs": ["egg","milk","cream","butter","cheese","parmesan","feta","mozzarella","yogurt","yoghurt","brie","ricotta","cheddar","goat cheese","creme fraiche","mascarpone"],

  };

  function getGroup(ing) {
    const lower = ing.toLowerCase();
    for (const [group, keywords] of Object.entries(SHOP_GROUPS)) {
      if (keywords.some(k => lower.includes(k))) return group;
    }
    return "Other";
  }

  function getRollingDays() {
    const days=[]; const today=new Date(); today.setHours(0,0,0,0);
    for(let i=-7;i<=7;i++){const d=new Date(today);d.setDate(today.getDate()+i);days.push(d);}
    return days;
  }
  function dateToKey(d){return d.toISOString().split("T")[0];}
  function getMonday(d=new Date()){
    const copy=typeof d==="string"?new Date(d+"T12:00:00"):new Date(d);
    const day=copy.getDay();const diff=copy.getDate()-day+(day===0?-6:1);
    copy.setDate(diff);return copy.toISOString().split("T")[0];
  }
  function getTodayKey(){const d=new Date();d.setHours(0,0,0,0);return dateToKey(d);}
  function formatDate(s){
    const d=new Date(s+"T12:00:00");
    return `${DAY_NAMES[d.getDay()].slice(0,3)} ${d.getDate()} ${SHORT_MONTHS[d.getMonth()]}`;
  }

  const H={"Content-Type":"application/json","apikey":SB_KEY,"Authorization":`Bearer ${SB_KEY}`,"Prefer":"return=representation"};
  async function sbGet(t,q=""){try{const r=await fetch(`${SB_URL}/rest/v1/${t}?${q}`,{headers:H});if(!r.ok)throw new Error(r.status);return r.json();}catch(e){return[];}}
  async function sbPost(t,b){try{const r=await fetch(`${SB_URL}/rest/v1/${t}`,{method:"POST",headers:H,body:JSON.stringify(b)});if(!r.ok)throw new Error(r.status);return r.json();}catch(e){return null;}}
  async function sbPatch(t,q,b){try{const r=await fetch(`${SB_URL}/rest/v1/${t}?${q}`,{method:"PATCH",headers:H,body:JSON.stringify(b)});if(!r.ok)throw new Error(r.status);return r.json();}catch(e){return null;}}
  async function sbDelete(t,q){try{await fetch(`${SB_URL}/rest/v1/${t}?${q}`,{method:"DELETE",headers:H});}catch(e){}}
  async function sbUpsert(t,b,oc){try{const r=await fetch(`${SB_URL}/rest/v1/${t}?on_conflict=${oc}`,{method:"POST",headers:{...H,"Prefer":"resolution=merge-duplicates,return=representation"},body:JSON.stringify(b)});if(!r.ok)throw new Error(r.status);return r.json();}catch(e){return null;}}

  // Shared styles
  const glass = {

    border: "1px solid rgba(100,160,100,0.18)",
    borderRadius: 16,
  };
  const inputSt = {

    borderRadius:10, color:"#e8f0e4", padding:"10px 14px", fontSize:15,

        <polyline points="51,48 57,42 63,44 69,35" stroke="#c8a84b" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" fill="none"/>
        <circle cx="69" cy="35" r="2.5" fill="#c8a84b"/>
      </svg>
    );
  }

  const TABS = [
    {id:"library", icon:"📚", label:"Recipes"},
    {id:"add",     icon:"✚",  label:"Add"},
    {id:"planner", icon:"📅", label:"Planner"},
    {id:"shopping",icon:"🛒", label:"Shopping"},
  ];

  function App(){
    const [pin,setPin]=useState("");
    const [authed,setAuthed]=useState(false);
    const [pinError,setPinError]=useState(false);
    const [appLoading,setAppLoading]=useState(false);
    const [connectionError,setConnectionError]=useState(false);
    const [view,setView]=useState("library");
    const [prevView,setPrevView]=useState("library");
    const [recipes,setRecipes]=useState([]);
    const [plannerData,setPlannerData]=useState({});
    const [selectedRecipe,setSelectedRecipe]=useState(null);
    const [cookStep,setCookStep]=useState(0);
    const [loading,setLoading]=useState(false);
    const [shopTicks,setShopTicks]=useState({});
    const [weekStart]=useState(getMonday());
    const [search,setSearch]=useState("");
    const [pickerSearch,setPickerSearch]=useState("");
    const [filterCat,setFilterCat]=useState("All");
    const [filterFav,setFilterFav]=useState(false);
    const [sortBy,setSortBy]=useState("newest");
    const [form,setForm]=useState({title:"",category:"Dinner",source_url:"",ingredients:"",steps:"",photo_url:"",servings:2,prep_time:"",cook_time:""});
    const [formError,setFormError]=useState("");
    const [uploadError,setUploadError]=useState("");
    const [toast,setToast]=useState("");
    const [editForm,setEditForm]=useState(null);
    const [pickerDay,setPickerDay]=useState(null);
    const [confirmDelete,setConfirmDelete]=useState(false);
    const [servingsCount,setServingsCount]=useState(null);
    const [customShopItems,setCustomShopItems]=useState([]);
    const [newCustomItem,setNewCustomItem]=useState("");
    const [cookLog,setCookLog]=useState([]);
    const fileInputRef=useRef(null);
    const todayKey=getTodayKey();
    const rollingDays=getRollingDays();

    // Sync bottom nav with view
    useEffect(()=>{
      const inner=document.getElementById("bottomNavInner");
      if(!inner)return;
      inner.innerHTML="";
      TABS.forEach(tab=>{
        const btn=document.createElement("button");
        btn.className="nav-tab"+(view===tab.id?" active":"");
        btn.innerHTML=`<span class="nav-tab-icon">${tab.icon}</span><span>${tab.label}</span>`;
        btn.onclick=()=>setView(tab.id);
        inner.appendChild(btn);
      });
    },[view,authed]);

    useEffect(()=>{
      if(authed){
        setAppLoading(true);setConnectionError(false);
        try{
          const s=localStorage.getItem("customShopItems");if(s)setCustomShopItems(JSON.parse(s));
          const l=localStorage.getItem("cookLog");if(l)setCookLog(JSON.parse(l));
          localStorage.removeItem("pinRemember");
        }catch(e){}
        const timeout=setTimeout(()=>{setAppLoading(false);setConnectionError(true);},10000);
        Promise.all([fetchRecipes(),fetchPlannerData(),fetchShopTicks()])
          .then(()=>clearTimeout(timeout))
          .finally(()=>{clearTimeout(timeout);setAppLoading(false);});
      }
    },[authed]);

    useEffect(()=>{
      if(pin.length===4){
        if(pin===CORRECT_PIN)setAuthed(true);
        else{setPinError(true);setTimeout(()=>{setPinError(false);setPin("");},800);}
      }
    },[pin]);

    function showToast(msg){setToast(msg);setTimeout(()=>setToast(""),2500);}
    async function fetchRecipes(){const d=await sbGet("recipes","order=created_at.desc");setRecipes(Array.isArray(d)?d:[]);}
    async function fetchPlannerData(){
      const start=rollingDays[0];const end=rollingDays[rollingDays.length-1];
      const d=await sbGet("week_plan",`date=gte.${dateToKey(start)}&date=lte.${dateToKey(end)}&select=*,recipes(*)`);
      const plan={};(Array.isArray(d)?d:[]).forEach(r=>{if(r.date)plan[r.date]=r;});setPlannerData(plan);
    }
    async function fetchShopTicks(){
      const d=await sbGet("shopping_ticks",`week_start=eq.${weekStart}&ticked=eq.true`);
      const t={};(Array.isArray(d)?d:[]).forEach(r=>{t[r.ingredient]=true;});setShopTicks(t);
    }
    async function toggleShopTick(ing){
      const nv=!shopTicks[ing];setShopTicks(t=>({...t,[ing]:nv}));
      if(nv)await sbUpsert("shopping_ticks",{week_start:weekStart,ingredient:ing,ticked:true},"week_start,ingredient");
      else await sbDelete("shopping_ticks",`week_start=eq.${weekStart}&ingredient=eq.${ing.replace(/&/g,'%26').replace(/=/g,'%3D')}`);
    }
    async function saveRecipe(recipe){
      setLoading(true);const r=await sbPost("recipes",recipe);setLoading(false);
      if(!r){showToast("❌ Save failed");return;}
      showToast("Recipe saved! 🌿");fetchRecipes();setView("library");
      setForm({title:"",category:"Dinner",source_url:"",ingredients:"",steps:"",photo_url:"",servings:2,prep_time:"",cook_time:""});
      if(fileInputRef.current)fileInputRef.current.value="";
    }
    async function saveRecipeQuiet(recipe,onDone){const r=await sbPost("recipes",recipe);if(r&&onDone)onDone();}
    async function deleteRecipe(id){
      await sbDelete("week_plan",`recipe_id=eq.${id}`);await sbDelete("recipes",`id=eq.${id}`);
      showToast("Recipe removed");fetchRecipes();fetchPlannerData();
      setSelectedRecipe(null);setConfirmDelete(false);setView("library");
    }
    async function assignDay(dk,rid){
      const ex=plannerData[dk];
      if(ex)await sbPatch("week_plan",`id=eq.${ex.id}`,{recipe_id:rid});
      else await sbPost("week_plan",{date:dk,recipe_id:rid,week_start:getMonday(dk)});
      await fetchPlannerData();showToast("Added to plan! 📅");
    }
    async function unassignDay(dk){const ex=plannerData[dk];if(ex){await sbDelete("week_plan",`id=eq.${ex.id}`);fetchPlannerData();}}
    async function updateRecipe(id,updates){
      setLoading(true);await sbPatch("recipes",`id=eq.${id}`,updates);setLoading(false);
      showToast("Saved! 🌿");await fetchRecipes();setSelectedRecipe(p=>({...p,...updates}));setEditForm(null);
    }
    async function toggleFavourite(recipe){
      const nv=!recipe.is_favourite;await sbPatch("recipes",`id=eq.${recipe.id}`,{is_favourite:nv});
      setSelectedRecipe(p=>({...p,is_favourite:nv}));setRecipes(rs=>rs.map(r=>r.id===recipe.id?{...r,is_favourite:nv}:r));
      showToast(nv?"Favourited ♥":"Removed from favourites");
    }
    function logCook(rid,title){
      const entry={recipeId:rid,recipeTitle:title,date:new Date().toISOString().split("T")[0]};
      const updated=[entry,...cookLog].slice(0,50);setCookLog(updated);
      try{localStorage.setItem("cookLog",JSON.stringify(updated));}catch(e){}
      showToast("Logged as cooked! 🍳");
    }
    function handleFormSubmit(){
      if(!form.title.trim()){setFormError("Title is required");return;}
      saveRecipe({title:form.title.trim(),category:form.category,source_url:form.source_url.trim()||null,
        photo_url:form.photo_url.trim()||null,ingredients:form.ingredients.split("\n").filter(l=>l.trim()),
        steps:form.steps.split("\n").filter(l=>l.trim()),servings:parseInt(form.servings)||2,
        prep_time:form.prep_time.trim()||null,cook_time:form.cook_time.trim()||null,
        is_favourite:false,rating:0,notes:null});
      setFormError("");
    }
    function handleJsonUpload(e){
      const files=Array.from(e.target.files);if(!files.length)return;
      let err=0,ok=0;const total=files.length;
      files.forEach(file=>{
        const reader=new FileReader();
        reader.onload=ev=>{
          try{
            const d=JSON.parse(ev.target.result);if(!d.title){err++;return;}
            saveRecipeQuiet({title:d.title,category:d.category||"Dinner",source_url:d.source_url||null,
              photo_url:d.photo_url||null,ingredients:Array.isArray(d.ingredients)?d.ingredients:[],
              steps:Array.isArray(d.steps)?d.steps:[],servings:d.servings||2,
              prep_time:d.prep_time||null,cook_time:d.cook_time||null,is_favourite:false,rating:0,notes:null},
            ()=>{ok++;if(ok+err===total){fetchRecipes();setView("library");showToast(`${ok} recipe${ok>1?"s":""} saved! 🌿`);}});
          }catch{err++;}
        };
        reader.readAsText(file);
      });
      e.target.value="";
    }
    function scaleIngredient(ing,scale){
      if(scale===1)return ing;
      return ing.replace(/(\d+\.?\d*)/g,(m)=>{const n=parseFloat(m)*scale;return Number.isInteger(n)?n:Math.round(n*10)/10;});
    }
    function buildShopGroups(){
      const seen={};
      Object.entries(plannerData).forEach(([dk,row])=>{
        if(!row?.recipes||dk<todayKey)return;
        (row.recipes.ingredients||[]).forEach(ing=>{const k=ing.trim().toLowerCase();if(!seen[k])seen[k]=ing.trim();});
      });
      const groups={};
      Object.values(seen).forEach(ing=>{const g=getGroup(ing);if(!groups[g])groups[g]=[];groups[g].push(ing);});
      return groups;
    }
    const filteredRecipes=[...recipes].filter(r=>{
      return r.title.toLowerCase().includes(search.toLowerCase())
        &&(filterCat==="All"||r.category===filterCat)
        &&(!filterFav||r.is_favourite);
    }).sort((a,b)=>{
      if(sortBy==="az")return a.title.localeCompare(b.title);
      if(sortBy==="rating")return(b.rating||0)-(a.rating||0);
      return 0;
    });
    const tonightRecipe=plannerData[todayKey]?.recipes;
    const baseServings=selectedRecipe?.servings||2;
    const currentServings=servingsCount!==null?servingsCount:baseServings;
    const servingsScale=currentServings/baseServings;

    // ── PIN ────────────────────────────────────────────────────────────────
    if(!authed) return (
      <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
        <div style={{...glassStrong,padding:"48px 36px",maxWidth:360,width:"100%",textAlign:"center"}} className="fade-in">
          <div style={{display:"flex",justifyContent:"center",marginBottom:20}}><Logo size={60}/></div>
          <h1 style={{fontFamily:"'DM Serif Display',serif",fontSize:34,color:"#e8f0e4",margin:"0 0 4px",lineHeight:1.1}}>Our Recipes</h1>
          <p style={{fontFamily:"'DM Mono',monospace",fontSize:11,color:"#6a8a6a",letterSpacing:"0.16em",textTransform:"uppercase",marginBottom:4}}>by DataIsCool</p>
          <p style={{color:"#9ab89a",fontSize:14,marginBottom:28}}>Enter your PIN to continue</p>
          <div style={{display:"flex",gap:10,justifyContent:"center",marginBottom:28}}>
            {[0,1,2,3].map(i=><div key={i} style={{width:14,height:14,borderRadius:"50%",background:pin.length>i?"#6db870":"rgba(100,150,100,0.2)",border:"1px solid rgba(100,160,100,0.3)",transition:"background 0.2s"}}/>)}
          </div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:10,maxWidth:240,margin:"0 auto 20px"}}>
            {[1,2,3,4,5,6,7,8,9,"",0,"⌫"].map((k,i)=>(
              <button key={i} style={{
                background:pinError?"rgba(120,40,40,0.4)":"rgba(36,56,48,0.8)",
                border:`1px solid ${pinError?"rgba(180,80,80,0.3)":"rgba(100,160,100,0.15)"}`,
                borderRadius:12,color:"#e8f0e4",fontSize:22,padding:"15px 0",cursor:k===""?"default":"pointer",
                opacity:k===""?0:1,transition:"all 0.15s",fontFamily:"'Syne',sans-serif"
              }} onClick={()=>{if(k==="⌫")setPin(p=>p.slice(0,-1));else if(k!==""&&pin.length<4)setPin(p=>p+k);}}>
                {k}
              </button>
            ))}
          </div>
          {pinError&&<p style={{color:"#c87070",fontSize:13,marginTop:8}}>Wrong PIN — try again</p>}
        </div>
      </div>
    );

    if(connectionError) return (
      <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",gap:16,padding:24}}>
        <div style={{fontSize:48}}>🌲</div>
        <div style={{fontFamily:"'DM Serif Display',serif",fontSize:24,color:"#e8f0e4"}}>Lost connection</div>
        <div style={{color:"#9ab89a",fontSize:14}}>Check your internet and try again</div>
        <button style={{...btnPrimary,width:"auto",padding:"12px 32px"}} onClick={()=>{setConnectionError(false);setAuthed(false);setPin("");}}>Try again</button>
      </div>
    );

    if(appLoading) return (
      <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",gap:14}}>
        <Logo size={52}/>
        <div style={{fontFamily:"'DM Mono',monospace",color:"#9ab89a",fontSize:13,letterSpacing:"0.08em"}}>Loading your recipes...</div>
      </div>
    );

    // ── COOK MODE ──────────────────────────────────────────────────────────
    if(view==="cook"&&selectedRecipe){
      const steps=selectedRecipe.steps||[];
      const progress=steps.length===0?100:Math.round(((cookStep+1)/steps.length)*100);
      return (
        <div style={{minHeight:"100vh",maxWidth:680,margin:"0 auto",display:"flex",flexDirection:"column"}}>
          <div style={{...glassStrong,borderRadius:0,padding:"16px 24px",display:"flex",alignItems:"center",gap:14}}>
            <button style={{background:"none",border:"none",color:"#9ab89a",cursor:"pointer",fontSize:14,fontFamily:"'Syne',sans-serif"}} onClick={()=>{setView("detail");setCookStep(0);}}>← Back</button>
            <span style={{fontFamily:"'DM Serif Display',serif",fontSize:20,color:"#e8f0e4",flex:1}}>{selectedRecipe.title}</span>
          </div>
          <div style={{height:3,background:"rgba(100,160,100,0.15)"}}>
            <div style={{height:3,background:"#6db870",width:`${progress}%`,transition:"width 0.3s"}}/>
          </div>
          <div style={{flex:1,padding:"40px 24px 24px",display:"flex",flexDirection:"column"}}>
            {steps.length===0?(
              <div style={{flex:1,display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",gap:12}}>
                <div style={{color:"#9ab89a"}}>No steps yet — Edit to add them.</div>
                <button style={btnSoft} onClick={()=>setView("detail")}>Back to recipe</button>
              </div>
            ):(
              <>
                <div style={{fontFamily:"'DM Mono',monospace",fontSize:12,color:"#6db870",letterSpacing:"0.14em",textTransform:"uppercase",marginBottom:20}}>Step {cookStep+1} of {steps.length}</div>
                <div style={{fontFamily:"'DM Serif Display',serif",fontSize:28,color:"#e8f0e4",lineHeight:1.5,flex:1}}>{steps[cookStep]}</div>
                <div style={{display:"flex",gap:12,marginTop:32,marginBottom:24}}>
                  <button style={{...btnSoft,flex:1,opacity:cookStep===0?0.35:1}} disabled={cookStep===0} onClick={()=>setCookStep(c=>c-1)}>← Prev</button>
                  {cookStep<steps.length-1
                    ?<button style={{...btnSoft,flex:1}} onClick={()=>setCookStep(c=>c+1)}>Next →</button>
                    :<button style={{background:"#5cb85c",border:"none",borderRadius:10,color:"#fff",fontSize:14,fontWeight:700,flex:1,cursor:"pointer",fontFamily:"'Syne',sans-serif"}} onClick={()=>{setView("detail");setCookStep(0);}}>Done ✓</button>}
                </div>
              </>
            )}
            <div style={{...glass,padding:"16px 18px"}}>
              <div style={{fontFamily:"'DM Mono',monospace",fontSize:10,color:"#9ab89a",letterSpacing:"0.12em",textTransform:"uppercase",marginBottom:10}}>Ingredients</div>
              {(selectedRecipe.ingredients||[]).map((ing,i)=><div key={i} style={{color:"#c8e0b8",fontSize:14,marginBottom:4}}>• {ing}</div>)}
            </div>
          </div>
        </div>
      );
    }

    // ── DETAIL ─────────────────────────────────────────────────────────────
    if(view==="detail"&&selectedRecipe) return (
      <div style={{minHeight:"100vh",maxWidth:680,margin:"0 auto",paddingBottom:40}}>
        {confirmDelete&&(
          <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.6)",zIndex:200,display:"flex",alignItems:"flex-end",justifyContent:"center"}}>
            <div style={{...glassStrong,borderRadius:"20px 20px 0 0",padding:"28px 24px 48px",width:"100%",maxWidth:680}}>
              <div style={{fontFamily:"'DM Serif Display',serif",fontSize:24,color:"#e8f0e4",marginBottom:8}}>Remove this recipe?</div>
              <div style={{color:"#9ab89a",fontSize:14,marginBottom:24}}>This cannot be undone.</div>
              <button style={{...btnPrimary,marginTop:0,background:"#b85248"}} onClick={()=>deleteRecipe(selectedRecipe.id)}>Yes, remove it</button>
              <button style={{...btnPrimary,marginTop:10,background:"rgba(36,56,48,0.8)"}} onClick={()=>setConfirmDelete(false)}>Cancel</button>
            </div>
          </div>
        )}
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"16px 20px",position:"sticky",top:0,zIndex:10,...glassStrong,borderRadius:0,borderLeft:"none",borderRight:"none",borderTop:"none"}}>
          <button style={{background:"none",border:"none",color:"#9ab89a",cursor:"pointer",fontSize:14,fontFamily:"'Syne',sans-serif"}} onClick={()=>{setView(prevView==="planner"?"planner":"library");setEditForm(null);setServingsCount(null);}}>← Back</button>
          <div style={{display:"flex",gap:14,alignItems:"center"}}>
            <button style={{background:"none",border:"none",fontSize:22,cursor:"pointer",color:selectedRecipe.is_favourite?"#6db870":"#6a8a6a"}} onClick={()=>toggleFavourite(selectedRecipe)}>
              {selectedRecipe.is_favourite?"♥":"♡"}
            </button>
            <button style={btnSoft} onClick={()=>setEditForm(editForm?null:{
              title:selectedRecipe.title,category:selectedRecipe.category||"Dinner",
              source_url:selectedRecipe.source_url||"",photo_url:selectedRecipe.photo_url||"",
              ingredients:(selectedRecipe.ingredients||[]).join("\n"),steps:(selectedRecipe.steps||[]).join("\n"),
              servings:selectedRecipe.servings||2,prep_time:selectedRecipe.prep_time||"",
              cook_time:selectedRecipe.cook_time||"",notes:selectedRecipe.notes||"",rating:selectedRecipe.rating||0,
            })}>{editForm?"Cancel":"Edit"}</button>
            <button style={{background:"none",border:"none",color:"#b85248",cursor:"pointer",fontSize:14,fontFamily:"'Syne',sans-serif"}} onClick={()=>setConfirmDelete(true)}>Remove</button>
          </div>
        </div>

        {editForm?(
          <div style={{padding:"20px 20px 80px"}}>
            <h2 style={{fontFamily:"'DM Serif Display',serif",fontSize:28,color:"#e8f0e4",marginBottom:20}}>Edit Recipe</h2>
            <label style={labelSt}>Title</label><input style={inputSt} value={editForm.title} onChange={e=>setEditForm(f=>({...f,title:e.target.value}))}/>
            <label style={labelSt}>Category</label>
            <select style={inputSt} value={editForm.category} onChange={e=>setEditForm(f=>({...f,category:e.target.value}))}>
              {CATEGORIES.map(c=><option key={c}>{c}</option>)}
            </select>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
              <div><label style={labelSt}>Prep</label><input style={inputSt} value={editForm.prep_time} onChange={e=>setEditForm(f=>({...f,prep_time:e.target.value}))} placeholder="10 min"/></div>
              <div><label style={labelSt}>Cook</label><input style={inputSt} value={editForm.cook_time} onChange={e=>setEditForm(f=>({...f,cook_time:e.target.value}))} placeholder="30 min"/></div>
            </div>
            <label style={labelSt}>Servings</label><input style={inputSt} type="number" min="1" value={editForm.servings} onChange={e=>setEditForm(f=>({...f,servings:e.target.value}))}/>
            <label style={labelSt}>Photo URL</label><input style={inputSt} value={editForm.photo_url} onChange={e=>setEditForm(f=>({...f,photo_url:e.target.value}))} placeholder="https://..."/>
            <label style={labelSt}>Source URL</label><input style={inputSt} value={editForm.source_url} onChange={e=>setEditForm(f=>({...f,source_url:e.target.value}))} placeholder="https://..."/>
            <label style={labelSt}>Notes</label>
            <textarea style={{...inputSt,resize:"vertical"}} rows={3} value={editForm.notes} onChange={e=>setEditForm(f=>({...f,notes:e.target.value}))} placeholder="Add more garlic next time!"/>
            <label style={labelSt}>Rating</label>
            <div style={{display:"flex",gap:6,marginTop:6}}>
              {[1,2,3,4,5].map(n=>(
                <button key={n} onClick={()=>setEditForm(f=>({...f,rating:n}))} style={{background:"none",border:"none",fontSize:28,cursor:"pointer",color:n<=editForm.rating?"#c8a84b":"rgba(100,150,100,0.2)",padding:0}}>★</button>
              ))}
            </div>
            <label style={labelSt}>Ingredients (one per line)</label>
            <textarea style={{...inputSt,resize:"vertical"}} rows={6} value={editForm.ingredients} onChange={e=>setEditForm(f=>({...f,ingredients:e.target.value}))}/>
            <label style={labelSt}>Steps (one per line)</label>
            <textarea style={{...inputSt,resize:"vertical"}} rows={6} value={editForm.steps} onChange={e=>setEditForm(f=>({...f,steps:e.target.value}))}/>
            <button style={btnPrimary} disabled={loading} onClick={()=>updateRecipe(selectedRecipe.id,{
              title:editForm.title.trim(),category:editForm.category,
              source_url:editForm.source_url.trim()||null,photo_url:editForm.photo_url.trim()||null,
              ingredients:editForm.ingredients.split("\n").filter(l=>l.trim()),
              steps:editForm.steps.split("\n").filter(l=>l.trim()),
              servings:parseInt(editForm.servings)||2,prep_time:editForm.prep_time.trim()||null,
              cook_time:editForm.cook_time.trim()||null,notes:editForm.notes.trim()||null,rating:editForm.rating||0,
            })}>{loading?"Saving...":"Save Changes"}</button>
          </div>
        ):(
          <>
            {selectedRecipe.photo_url&&<img src={selectedRecipe.photo_url} alt={selectedRecipe.title} style={{width:"100%",height:280,objectFit:"cover"}} loading="lazy"/>}
            <div style={{padding:"24px 20px 40px"}}>
              <div style={{display:"flex",alignItems:"flex-start",gap:12,marginBottom:16}}>
                <div style={{flex:1}}>
                  <div style={{fontSize:12,color:"#9ab89a",marginBottom:8,fontFamily:"'DM Mono',monospace",letterSpacing:"0.08em"}}>{selectedRecipe.category}</div>
                  <h2 style={{fontFamily:"'DM Serif Display',serif",fontSize:34,color:"#e8f0e4",lineHeight:1.1}}>{selectedRecipe.title}</h2>
                </div>
                {selectedRecipe.rating>0&&<div style={{color:"#c8a84b",fontSize:18,marginTop:8,flexShrink:0}}>{"★".repeat(selectedRecipe.rating)}</div>}
              </div>
              {(selectedRecipe.prep_time||selectedRecipe.cook_time)&&(
                <div style={{display:"flex",gap:16,marginBottom:16,color:"#9ab89a",fontSize:13,fontFamily:"'DM Mono',monospace"}}>
                  {selectedRecipe.prep_time&&<span>⏱ {selectedRecipe.prep_time}</span>}
                  {selectedRecipe.cook_time&&<span>🍳 {selectedRecipe.cook_time}</span>}
                </div>
              )}
              {selectedRecipe.notes&&<div style={{...glass,padding:"12px 16px",marginBottom:16,color:"#9ab89a",fontSize:14,fontStyle:"italic",lineHeight:1.5}}>💬 {selectedRecipe.notes}</div>}
              {selectedRecipe.source_url&&<a href={selectedRecipe.source_url} target="_blank" rel="noopener noreferrer" style={{color:"#6db870",fontSize:13,display:"block",marginBottom:16}}>View original ↗</a>}

              <div style={{...glass,display:"flex",alignItems:"center",gap:12,padding:"12px 16px",marginBottom:4}}>
                <span style={{fontFamily:"'DM Mono',monospace",fontSize:12,color:"#9ab89a",flex:1,letterSpacing:"0.06em"}}>Servings</span>
                <button onClick={()=>setServingsCount(s=>Math.max(1,(s!==null?s:baseServings)-1))} style={{background:"rgba(36,56,48,0.8)",border:"1px solid rgba(100,160,100,0.2)",color:"#e8f0e4",borderRadius:8,width:34,height:34,cursor:"pointer",fontSize:18}}>−</button>
                <span style={{color:"#e8f0e4",fontSize:18,fontWeight:700,minWidth:28,textAlign:"center"}}>{currentServings}</span>
                <button onClick={()=>setServingsCount(s=>(s!==null?s:baseServings)+1)} style={{background:"rgba(36,56,48,0.8)",border:"1px solid rgba(100,160,100,0.2)",color:"#e8f0e4",borderRadius:8,width:34,height:34,cursor:"pointer",fontSize:18}}>+</button>
                {servingsCount!==null&&<button onClick={()=>setServingsCount(null)} style={{background:"none",border:"none",color:"#6a8a6a",fontSize:12,cursor:"pointer",fontFamily:"'Syne',sans-serif"}}>Reset</button>}
              </div>

              <div style={{fontFamily:"'DM Serif Display',serif",fontSize:18,color:"#e8f0e4",marginTop:24,marginBottom:12,borderBottom:"1px solid rgba(100,160,100,0.12)",paddingBottom:8}}>Ingredients</div>
              {(selectedRecipe.ingredients||[]).map((ing,i)=><div key={i} style={{color:"#c8e0b8",fontSize:15,marginBottom:7,lineHeight:1.5}}>• {scaleIngredient(ing,servingsScale)}</div>)}

              <div style={{fontFamily:"'DM Serif Display',serif",fontSize:18,color:"#e8f0e4",marginTop:24,marginBottom:12,borderBottom:"1px solid rgba(100,160,100,0.12)",paddingBottom:8}}>Steps</div>
              {(selectedRecipe.steps||[]).length===0
                ?<div style={{color:"#9ab89a",fontSize:14,fontStyle:"italic"}}>No steps yet — tap Edit to add them.</div>
                :(selectedRecipe.steps||[]).map((step,i)=>(
                  <div key={i} style={{display:"flex",gap:14,marginBottom:14,color:"#c8e0b8",fontSize:15,lineHeight:1.6}}>
                    <span style={{background:"#6db870",color:"#1a2e20",borderRadius:"50%",width:26,height:26,display:"inline-flex",alignItems:"center",justifyContent:"center",fontSize:12,flexShrink:0,marginTop:2,fontWeight:700}}>{i+1}</span>
                    {step}
                  </div>
                ))}

              <div style={{fontFamily:"'DM Serif Display',serif",fontSize:18,color:"#e8f0e4",marginTop:24,marginBottom:12,borderBottom:"1px solid rgba(100,160,100,0.12)",paddingBottom:8}}>Plan this meal</div>
              <div style={{display:"flex",gap:8,overflowX:"auto",paddingBottom:8,marginBottom:24}}>
                {rollingDays.map(d=>{
                  const dk=dateToKey(d);const isToday=dk===todayKey;const isPlanned=plannerData[dk]?.recipe_id===selectedRecipe.id;
                  return (
                    <div key={dk} onClick={()=>assignDay(dk,selectedRecipe.id)} style={{flexShrink:0,textAlign:"center",cursor:"pointer",padding:"10px 12px",borderRadius:12,minWidth:54,transition:"all 0.15s",
                      background:isPlanned?"#6db870":isToday?"rgba(109,184,112,0.15)":"rgba(36,56,48,0.6)",
                      border:isToday?`1px solid rgba(109,184,112,0.5)`:`1px solid rgba(100,160,100,0.12)`}}>
                      <div style={{fontFamily:"'DM Mono',monospace",fontSize:9,color:isPlanned?"#1a2e20":"#9ab89a",letterSpacing:"0.08em"}}>{DAY_NAMES[d.getDay()].slice(0,3).toUpperCase()}</div>
                      <div style={{fontSize:17,fontWeight:700,color:isPlanned?"#1a2e20":isToday?"#6db870":"#e8f0e4",marginTop:2}}>{d.getDate()}</div>
                    </div>
                  );
                })}
              </div>
              <button style={{...btnPrimary,fontSize:16}} onClick={()=>{setCookStep(0);setView("cook");}}>🍳 Start Cooking</button>
            </div>
          </>
        )}
      </div>
    );

    // ── MAIN APP ───────────────────────────────────────────────────────────
    return (
      <div style={{minHeight:"100vh",display:"flex",flexDirection:"column"}}>
        {toast&&<div style={{position:"fixed",top:20,left:"50%",transform:"translateX(-50%)",background:"rgba(36,56,48,0.95)",backdropFilter:"blur(12px)",border:"1px solid rgba(109,184,112,0.3)",color:"#e8f0e4",padding:"10px 24px",borderRadius:20,fontSize:14,zIndex:200,whiteSpace:"nowrap",fontWeight:600,fontFamily:"'Syne',sans-serif",boxShadow:"0 4px 20px rgba(0,0,0,0.3)"}}>{toast}</div>}

        {/* Header */}
        <div style={{...glassStrong,borderRadius:0,borderLeft:"none",borderRight:"none",borderTop:"none",padding:"14px 24px",display:"flex",alignItems:"center",justifyContent:"space-between",position:"sticky",top:0,zIndex:10}}>
          <div style={{display:"flex",alignItems:"center",gap:12}}>
            <Logo size={32}/>
            <span style={{fontFamily:"'DM Serif Display',serif",fontSize:20,color:"#e8f0e4"}}>Our Recipes</span>
          </div>
          <div style={{display:"flex",alignItems:"center",gap:16}}>
            {/* Desktop tabs */}
            <div className="top-tabs" style={{gap:4}}>
              {TABS.map(tab=>(
                <button key={tab.id} onClick={()=>setView(tab.id)} style={{background:"none",border:"none",padding:"8px 14px",cursor:"pointer",fontFamily:"'DM Mono',monospace",fontSize:11,letterSpacing:"0.1em",textTransform:"uppercase",
                  color:view===tab.id?"#6db870":"#6a8a6a",
                  borderBottom:view===tab.id?"2px solid #6db870":"2px solid transparent",
                  transition:"all 0.15s"}}>
                  {tab.icon} {tab.label}
                </button>
              ))}
            </div>
            <a href="/" style={{fontFamily:"'DM Mono',monospace",fontSize:11,color:"#6a8a6a",textDecoration:"none",letterSpacing:"0.08em",whiteSpace:"nowrap"}}>← Hub</a>
          </div>
        </div>

        {/* Content */}
        <div className="content-area" style={{flex:1,maxWidth:860,margin:"0 auto",width:"100%",padding:"28px 20px 40px"}}>

          {/* LIBRARY */}
          {view==="library"&&(
            <div>
              {tonightRecipe?(
                <div onClick={()=>{setSelectedRecipe(tonightRecipe);setPrevView("library");setServingsCount(null);setView("detail");}}
                  style={{...glass,padding:"16px 20px",marginBottom:24,cursor:"pointer",display:"flex",alignItems:"center",gap:14,borderColor:"rgba(109,184,112,0.3)"}} className="hcard">
                  {tonightRecipe.photo_url
                    ?<img src={tonightRecipe.photo_url} alt="" style={{width:56,height:56,borderRadius:10,objectFit:"cover",flexShrink:0}} loading="lazy"/>
